<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Quản Lý Siêu Thị</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Giúp input không bị tràn viền */
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        #message {
            margin-top: 15px;
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>ĐĂNG NHẬP</h2>
        <div class="input-group">
            <label for="username">Tên đăng nhập:</label>
            <input type="text" id="username" placeholder="Nhập tài khoản...">
        </div>
        <div class="input-group">
            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
        </div>
        <button onclick="thucHienDangNhap()">Đăng Nhập</button>
        <div id="message"></div>
    </div>

    <script>
        function thucHienDangNhap() {
            // Lấy dữ liệu người dùng nhập
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const messageBox = document.getElementById('message');

            // Xóa thông báo lỗi cũ (nếu có)
            messageBox.innerText = "";

            if (!user || !pass) {
                messageBox.innerText = "Vui lòng nhập đầy đủ thông tin!";
                return;
            }

            // Đóng gói dữ liệu để gửi đi
            const data = {
                username: user,
                password: pass
            };

            // Gọi API đến Spring Boot (mặc định port 8080)
            fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                // Ép kiểu dữ liệu trả về thành JSON
                return response.json();
            })
            .then(result => {
                if (result.success) {
                    // Đăng nhập thành công
                    alert(result.message + " - Xin chào " + result.role);
                    
                    // Lưu thông tin vào LocalStorage để các trang khác biết ai đang đăng nhập
                    localStorage.setItem("manv", result.manv);
                    localStorage.setItem("role", result.role);

                    // Chuyển hướng sang trang quản lý chính của bạn (thay 'index.html' bằng tên file thực tế của bạn)
                    window.location.href = "index.html"; 
                } else {
                    // Đăng nhập thất bại (sai tài khoản/mật khẩu)
                    messageBox.innerText = result.message;
                }
            })
            .catch(error => {
                console.error('Lỗi:', error);
                messageBox.innerText = "Không thể kết nối đến Server. Vui lòng kiểm tra lại Spring Boot!";
            });
        }
    </script>

</body>
</html>
